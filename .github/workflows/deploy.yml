name: CI/CD · Build & Deploy to AWS ECR + EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # -------------------------------------------------------------------------
  # JOB 1: Validação
  # -------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Dockerfile syntax
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3018

  # -------------------------------------------------------------------------
  # JOB 2: Build e Push da imagem para o ECR
  # -------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG_LATEST=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_ENV
          echo "IMAGE_TAG_SHA=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG_LATEST }}
            ${{ env.IMAGE_TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  # -------------------------------------------------------------------------
  # JOB 3: Deploy automático na EC2 via SSM Run Command
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy container via SSM Run Command
        id: ssm
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"docker pull ${IMAGE}\",
              \"docker stop app || true\",
              \"docker rm app || true\",
              \"docker run -d --name app --restart unless-stopped -p 80:8080 ${IMAGE}\",
              \"docker image prune -f\"
            ]" \
            --comment "Deploy triggered by GitHub Actions - commit ${{ github.sha }}" \
            --output text \
            --query "Command.CommandId")

          echo "command-id=${COMMAND_ID}" >> $GITHUB_OUTPUT
          echo "SSM Command ID: ${COMMAND_ID}"

      - name: Aguardar conclusão do deploy
        run: |
          echo "Aguardando execução do comando SSM..."
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command-id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Verificar resultado do deploy
        run: |
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command-id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StatusDetails" \
            --output text)

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command-id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text)

          echo "Status: ${STATUS}"
          echo "Output: ${OUTPUT}"

          if [ "${STATUS}" != "Success" ]; then
            echo "❌ Deploy falhou com status: ${STATUS}"
            exit 1
          fi

          echo "✅ Deploy concluído com sucesso"

      - name: Resumo do deploy
        run: |
          echo "### ✅ Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "| ----- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Instância** | ${{ secrets.EC2_INSTANCE_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagem** | ${{ env.ECR_REPOSITORY }}:latest |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Autor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

